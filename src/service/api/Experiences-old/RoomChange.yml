Auto Room Change:
  emoji: "💡"
  start-room: Get To Know Us
  agents:
    # Global Agents - Defined Once, Used Everywhere
    Inform Agent:
      emoji: "💡"
      model: gpt-4
      instructions: >
        {{messages}}
        An one line story about the above messages!  
    Next Room Agent:
      emoji: "🧠"
      model: gpt-4
      instructions: >
        {{messages}} 
        An one line review about the above messages! 
    Gather Agent:
      emoji: "🔐"
      model: gpt-4
      instructions: >
        {{messages}}
        An one line to promote of the aabove messages!  
    Job Agent:
      emoji: "🔐"
      model: gpt-4
      instructions: >
        {{messages}}
        An one line to promote of the aabove messages!   
    Apply Agent:
      emoji: "🔐"
      model: gpt-4
      instructions: >
        {{messages}}
        An one line to promote of the aabove messages!   
 
  chatrooms:
    Get To Know Us:
      emoji: "🧠"
      agents:
        - name: Inform Agent
     
      strategies: 
        

        termination:
            continuation-agent-name: By Pass Human

            regex-termination:
              agents: []
              expressions:
                - pattern: "(?i).*terminate.*"
                  value: true
                - pattern: "(?i).*exit.*"
                  value: false  

            constant-termination:
                agents: []
                value: true

            prompt-termination:
                agents: []
                instructions: > 
                    Do something good
                     {{$history}}
                history-variable-name: history
  
                result-parser:
                    regex:
                        - pattern: "(?i).*terminate.*"
                          value: true
                        - pattern: "(?i).*exit.*"
                          value: false 

                truncation-reducer:
                    target-count: 50
                    threshold-count: 10
                    
                summarization-reducer:
                    instructions: >
                        Provide a concise and complete summarization of the entire dialog that does not exceed 5 sentences.
                        This summary must always:
                        - Consider both user and assistant interactions.
                        - Maintain continuity for further dialog.
                        - Include details from any existing summary.
                        - Focus on the most significant aspects of the dialog.
                        This summary must never:
                        - Critique, correct, interpret, presume, or assume.
                        - Identify faults, mistakes, misunderstanding, or correctness.
                        - Analyze what has not occurred.
                        - Exclude details from any existing summary.

        selection:
            sequential-selection:
                initial-agent: agentName

            round-robin-selection:
                initial-agent: agentName
                agents: [agent1, agent2]

            prompt-select:
                instructions: > 
                    Do something good
                     {{$history}}
                history-variable-name: history
                
                evaluate-name-only: true or yes
                
                result-parser:
                     regex:
                        - pattern: (\d{3})-(\d{3})-(\d{4})
                          replacement: ($1) $2-$3
                        - pattern: (\d{3})-(\d{3})-(\d{4})
                          replacement: ($1)   
                     json:
                        - format: >
                              {
                                name: "*",
                                reason: "*"
                              }
                        - variable: name
                  
        rules:
            # Rule 1: General agent flow
            - name: Rule 1
              current:
                - name: start
              next:
                - name: Inform Agent
              termination:
                  name: User Input 
                  presets: ["Yes"]
          
            # Rule 3: When the message comes from Assistant AI
            - name: Rule 4
              current:
                - name: User Input 
              next:
                - name: Get To Know You
                  context-transfer:
                    prompt: >
                        {{messages}}
                        Summarize the conversation
            
          
      moderation:
        prompt: > 
            Answer simple yes or no if this is hateful speach or voilence to others
            {{messages}}
        messages-preset-filters: [Last message]

    Get To Know You:
      emoji: "🧠"
      agents:
        - name: Gather Agent
        - name: Next Room Agent
      strategies:
        termination:
              type: "Regex"
              value: "yes"
              presets: ["No"]
        rules:
          - current:
              - name: start
            next:
              - name: Gather Agent
          - current:
              - name: Gather Agent
            next:
              - name: Next Room Agent
           
          - current:
              - name: Next Room Agent
            next:
              - name: Find The Job
                context-transfer:
                    prompt: >
                        {{messages}}
                        Summarize the conversation
             

    Find The Job:
      emoji: "🧠"
      agents:
        - name: Job Agent
        - name: Next Room Agent
      strategies:
        termination:
              presets: ["No"]
        rules:
          - current:
              - name: Job Agent
            next:
              - name: Next Room Agent
          - current:
              - name: Next Room Agent
            next:
              - name: Apply For Job
                context-transfer:
                    prompt: >
                        {{messages}}
                        Summarize the conversation
            
    
    Apply For Job:
      emoji: "🧠"
      agents:
        - name: Apply Agent
      strategies:
        rules:
          - current:
              - name: Apply Agent
            next:
              - name: Apply Agent
            termination:
              presets: ["Yes"]
         